name: checks

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax
        run: python -m py_compile app.py pipeline.py generate_video.py dreamina_batch.py doubao_review.py

      - name: JavaScript syntax
        run: node --check web/app.js
